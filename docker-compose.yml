version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: gtrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gtrack_user
      POSTGRES_PASSWORD: gtrack_password
      POSTGRES_DB: gtrack_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gtrack_user -d gtrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gtrack_network
    labels:
      - "com.example.description=G-Track PostgreSQL Database"

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gtrack_backend
    restart: unless-stopped
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql+asyncpg://gtrack_user:gtrack_password@postgres:5432/gtrack_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      API_VERSION: 1.0
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://frontend:3000","http://127.0.0.1:5173","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - gtrack_network
    labels:
      - "com.example.description=G-Track FastAPI Backend"
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Starting application...' &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gtrack_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gtrack.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - gtrack_network
    labels:
      - "com.example.description=G-Track pgAdmin Interface"

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  gtrack_network:
    driver: bridge
